<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condolytics — Acesso à Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:        #0A0C0F;
    --surface:   #111318;
    --surface2:  #1A1D24;
    --amber:     #B8872A;
    --amber-l:   #D4A44C;
    --amber-p:   rgba(184,135,42,0.08);
    --off-white: #E8E6E0;
    --gray:      #6B7280;
    --gray-l:    #9CA3AF;
    --red:       #E05C3A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--off-white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(184,135,42,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,135,42,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(184,135,42,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 24px;
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border: 1px solid rgba(184,135,42,0.3);
    border-radius: 12px;
    margin-bottom: 16px;
    background: var(--amber-p);
  }

  .logo-mark svg {
    width: 28px;
    height: 28px;
  }

  .logo-name {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--amber-l);
    display: block;
    margin-bottom: 6px;
  }

  .logo-tagline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gray);
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid rgba(184,135,42,0.12);
    border-radius: 16px;
    padding: 40px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.3),
      0 24px 64px rgba(0,0,0,0.4),
      0 0 80px rgba(184,135,42,0.03);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--off-white);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .card-title em {
    font-style: italic;
    color: var(--amber-l);
  }

  .card-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--gray);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* Form */
  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-l);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: var(--off-white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input::placeholder { color: var(--gray); }

  input:focus {
    border-color: rgba(184,135,42,0.4);
    box-shadow: 0 0 0 3px rgba(184,135,42,0.08);
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--amber) 0%, var(--amber-l) 100%);
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #0A0C0F;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.99); }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0A0C0F;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Error */
  .error-msg {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(224,92,58,0.08);
    border: 1px solid rgba(224,92,58,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 12.5px;
    color: var(--red);
    line-height: 1.5;
  }

  .error-msg.show { display: flex; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .divider span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gray);
    text-transform: uppercase;
  }

  /* Footer */
  .card-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-secure {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--gray);
  }

  .footer-secure svg {
    width: 12px; height: 12px;
    opacity: 0.5;
  }

  .footer-version {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--gray);
    opacity: 0.5;
    letter-spacing: 0.1em;
  }

  /* Status indicator */
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4CAF82;
    box-shadow: 0 0 8px #4CAF82;
    animation: pulse 2s infinite;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none">
        <rect x="4" y="14" width="4" height="10" fill="#B8872A" rx="1"/>
        <rect x="10" y="9" width="4" height="15" fill="#D4A44C" rx="1"/>
        <rect x="16" y="4" width="4" height="20" fill="#B8872A" rx="1"/>
        <path d="M4 13 L12 7 L20 3" stroke="#D4A44C" stroke-width="1" 
              stroke-linecap="round" fill="none" opacity="0.5"/>
        <circle cx="20" cy="3" r="2" fill="#D4A44C"/>
      </svg>
    </div>
    <span class="logo-name">CONDOLYTICS</span>
    <span class="logo-tagline">Inteligência Fiscal Condominial</span>
  </div>

  <!-- Card de login -->
  <div class="card">
    <h1 class="card-title">Bem-vindo de <em>volta.</em></h1>
    <p class="card-sub">
      <span class="status-dot"></span>
      Plataforma operacional · Acesse com suas credenciais
    </p>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        placeholder="seu@email.com.br"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input
        type="password"
        id="senha"
        placeholder="••••••••••"
        autocomplete="current-password"
      />
    </div>

    <button class="btn" id="btnLogin" onclick="fazerLogin()">
      Acessar Plataforma
    </button>

    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6" stroke="#E05C3A" stroke-width="1.5"/>
        <path d="M7 4v3.5M7 9.5v.5" stroke="#E05C3A" 
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="errorText">Erro ao fazer login</span>
    </div>

    <div class="card-footer">
      <div class="footer-secure">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M6 1L2 3v3c0 2.5 1.8 4.3 4 5 2.2-.7 4-2.5 4-5V3L6 1z"
                stroke="currentColor" stroke-width="1.2" fill="none"/>
        </svg>
        Conexão segura · SSL
      </div>
      <span class="footer-version">v1.0 · 2025</span>
    </div>
  </div>

</div>

<script src="js/supabase.js"></script>
<script>
  // Foca no campo de e-mail ao carregar
  window.addEventListener('load', () => {
    document.getElementById('email').focus();

    // Se já estiver logado, redireciona
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) redirecionarPorPerfil();
    });
  });

  // Login ao pressionar Enter
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') fazerLogin();
  });

  async function fazerLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btnLogin');
    const erro  = document.getElementById('errorMsg');
    const erroTxt = document.getElementById('errorText');

    // Validação básica
    if (!email || !senha) {
      erroTxt.textContent = 'Preencha e-mail e senha para continuar.';
      erro.classList.add('show');
      return;
    }

    // Estado de carregamento
    btn.disabled = true;
    btn.innerHTML = `
      <div class="btn-loading">
        <div class="spinner"></div>
        Verificando credenciais...
      </div>`;
    erro.classList.remove('show');

    try {
      await login(email, senha);
      await redirecionarPorPerfil();
    } catch (e) {
      // Mensagens de erro em português
      const mensagens = {
        'Invalid login credentials':
          'E-mail ou senha incorretos. Verifique e tente novamente.',
        'Email not confirmed':
          'Confirme seu e-mail antes de acessar. Verifique sua caixa de entrada.',
        'Too many requests':
          'Muitas tentativas. Aguarde alguns minutos e tente novamente.'
      };
      erroTxt.textContent = mensagens[e.message] ||
        'Erro ao acessar. Tente novamente em instantes.';
      erro.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Acessar Plataforma';
    }
  }
</script>
</body>
</html>
