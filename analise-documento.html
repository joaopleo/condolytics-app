<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Condolytics — Análise de Documento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0A0C0F; --surface:#111318; --surface2:#16191F;
      --border:rgba(201,168,76,0.12); --border2:rgba(255,255,255,0.06);
      --gold:#C9A84C; --gold-dim:rgba(201,168,76,0.18);
      --text:#E8E6E0; --text-dim:#9A9690; --text-faint:#52504C;
      --red:#E05C3A; --green:#4CAF7D; --blue:#5B9BD5;
      --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",Arial,sans-serif;
      --font-mono:'IBM Plex Mono',ui-monospace,"SF Mono",monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    /* HEADER */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 20px;border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
      background:rgba(10,12,15,0.94);backdrop-filter:blur(20px);
      animation:slideDown 0.4s ease forwards;
    }
    .logo-link{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .back-btn{
      display:flex;align-items:center;gap:6px;padding:7px 14px;
      background:var(--surface);border:1px solid var(--border2);border-radius:8px;
      font-family:var(--font-sans);font-size:12px;color:var(--text-dim);cursor:pointer;text-decoration:none;
      transition:border-color 0.15s,color 0.15s;
    }
    .back-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}

    /* CONTENT */
    .page{max-width:720px;margin:0 auto;padding:32px 20px 60px;}

    /* SECTION HEADER */
    .sec-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
    .sec-icon{width:40px;height:40px;background:var(--gold-dim);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sec-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.01em;}
    .sec-sub{font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-top:2px;}

    /* UPLOAD BOX */
    .upload-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:20px;}
    .upload-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .upload-text{flex:1;min-width:180px;}
    .upload-text strong{font-size:13px;font-weight:500;color:var(--text);display:block;margin-bottom:3px;}
    .upload-text span{font-size:12px;color:var(--text-dim);}
    .btn-upload{
      display:flex;align-items:center;gap:8px;padding:9px 20px;
      background:var(--gold);color:#0A0C0F;border:none;border-radius:8px;
      font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
    }
    .loading-row{display:none;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);}
    .spinner{width:16px;height:16px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    .erro-box{display:none;margin-top:12px;padding:10px 14px;background:rgba(224,92,58,0.1);border:1px solid rgba(224,92,58,0.3);border-radius:8px;font-size:12px;color:var(--red);}

    /* TABS */
    .tab-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
    .tabs-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
    .tab-btn{
      font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;
      padding:6px 14px;border-radius:6px;background:var(--surface);border:1px solid var(--border2);
      color:var(--text-dim);cursor:pointer;transition:all 0.18s;
    }
    .tab-btn.active{background:var(--gold-dim);border-color:rgba(201,168,76,0.4);color:var(--gold);}

    /* RESULTADO */
    #resultado{display:grid;gap:12px;}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .kpi-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:16px 18px;}
    .kpi-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
    .kpi-val{font-size:20px;font-weight:600;}
    .score-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
    .score-num{font-size:48px;font-weight:700;line-height:1;}
    .score-meta{flex:1;min-width:180px;}
    .score-meta-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
    .lista-box{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:16px 18px;}
    .lista-titulo{font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
    .lista-item{font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  </style>
</head>
<body>

<header>
  <a class="logo-link" href="conselho.html">
    <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
      <polygon points="22,2 39,11.5 39,32.5 22,42 5,32.5 5,11.5" fill="#0A0C0F" stroke="#C9A84C" stroke-width="2"/>
      <rect x="9"  y="26" width="4" height="9"  rx="0.5" fill="#C9A84C"/>
      <rect x="14" y="20" width="4" height="15" rx="0.5" fill="#C9A84C"/>
      <rect x="19" y="13" width="4" height="22" rx="0.5" fill="#C9A84C"/>
      <rect x="24" y="20" width="4" height="15" rx="0.5" fill="#C9A84C"/>
      <rect x="29" y="26" width="4" height="9"  rx="0.5" fill="#C9A84C"/>
      <line x1="8" y1="35.5" x2="36" y2="35.5" stroke="#C9A84C" stroke-width="1.2"/>
    </svg>
    <div>
      <div style="font-size:14px;font-weight:700;color:var(--text);">Condo<span style="color:var(--gold);font-weight:300">lytics</span></div>
      <div style="font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);">Conselho</div>
    </div>
  </a>
  <a class="back-btn" href="conselho.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Voltar
  </a>
</header>

<div class="page">
  <div class="sec-header">
    <div class="sec-icon">
      <svg width="20" height="20" viewBox="0 0 44 44" fill="none">
        <polygon points="22,2 39,11.5 39,32.5 22,42 5,32.5 5,11.5" fill="#0A0C0F" stroke="#C9A84C" stroke-width="2.5"/>
        <rect x="9"  y="26" width="4" height="9"  rx="0.5" fill="#C9A84C"/>
        <rect x="14" y="20" width="4" height="15" rx="0.5" fill="#C9A84C"/>
        <rect x="19" y="13" width="4" height="22" rx="0.5" fill="#C9A84C"/>
        <rect x="24" y="20" width="4" height="15" rx="0.5" fill="#C9A84C"/>
        <rect x="29" y="26" width="4" height="9"  rx="0.5" fill="#C9A84C"/>
        <line x1="8" y1="35.5" x2="36" y2="35.5" stroke="#C9A84C" stroke-width="1.2"/>
      </svg>
    </div>
    <div>
      <div class="sec-title">Análise de Documento</div>
      <div class="sec-sub">Prestação de contas via IA</div>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-box">
    <div class="upload-row">
      <div class="upload-text">
        <strong>Analise sua prestação de contas aqui</strong>
        <span>Faça upload do PDF mensal. Nossa IA extrai todos os dados e gera um relatório completo.</span>
      </div>
      <div>
        <input type="file" id="analise-input" accept=".pdf" style="display:none" onchange="analisarPDF(this.files[0])">
        <button class="btn-upload" onclick="document.getElementById('analise-input').click()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v9M5 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Enviar PDF
        </button>
      </div>
    </div>
    <div class="loading-row" id="loading">
      <div class="spinner"></div>
      <span style="font-size:12px;color:var(--text-dim);">Analisando documento com IA...</span>
    </div>
    <div class="erro-box" id="erro"></div>
  </div>

  <!-- Tabs / lista de análises -->
  <div class="tab-label">Análises Disponíveis</div>
  <div class="tabs-row" id="tabs">
    <div style="color:var(--text-dim);font-size:13px;">Nenhuma análise ainda.</div>
  </div>

  <!-- Resultado -->
  <div id="resultado"></div>
</div>

<script>
let _condoAtual = null;
let _usuario = null;

window.addEventListener('load', async () => {
  _usuario = await protegerPagina(['conselho', 'admin']);
  if (!_usuario) return;

  // Busca condomínio do usuário
  const { data: vinc } = await db.from('usuarios_condominios')
    .select('condominio_id')
    .eq('usuario_id', _usuario.id)
    .limit(1)
    .single();
  if (vinc) _condoAtual = vinc.condominio_id;

  await carregarAnalises();
});

async function analisarPDF(file) {
  if (!file) return;
  if (!_condoAtual) { alert('Condomínio não identificado.'); return; }

  const loading = document.getElementById('loading');
  const erroEl  = document.getElementById('erro');
  loading.style.display = 'flex';
  erroEl.style.display  = 'none';

  try {
    const { data: exist } = await db.from('analises_pdf')
      .select('id,periodo')
      .eq('condominio_id', _condoAtual)
      .eq('nome_arquivo', file.name)
      .single();
    if (exist) {
      erroEl.style.display = 'block';
      erroEl.textContent = `Este PDF já foi analisado (${exist.periodo}). Os dados já estão disponíveis abaixo.`;
      await carregarAnalises();
      return;
    }

    const { data: { session } } = await db.auth.getSession();
    const fd = new FormData();
    fd.append('pdf', file);
    fd.append('condominio_id', _condoAtual);
    fd.append('user_id', session?.user?.id || '');

    const resp = await fetch('https://mritzsidaqngexgijoqc.supabase.co/functions/v1/analisar-pdf', {
      method: 'POST', body: fd
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || 'Erro ao processar PDF');

    await carregarAnalises();
  } catch(e) {
    erroEl.style.display = 'block';
    erroEl.textContent   = 'Falha ao processar o PDF: ' + e.message;
  } finally {
    loading.style.display = 'none';
  }
}

async function carregarAnalises() {
  if (!_condoAtual) return;
  const { data } = await db.from('analises_pdf')
    .select('id,periodo,periodo_key,resultado')
    .eq('condominio_id', _condoAtual)
    .order('periodo_key', { ascending: false })
    .limit(5);

  const tabsEl = document.getElementById('tabs');
  if (!data?.length) {
    tabsEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">Nenhuma análise ainda.</div>';
    document.getElementById('resultado').innerHTML = '';
    return;
  }

  tabsEl.innerHTML = data.map((a, i) => {
    return `<button class="tab-btn${i===0?' active':''}"
      onclick="selecionarAnalise(this, '${JSON.stringify(a.resultado).replace(/'/g,"&#39;").replace(/"/g,"&quot;")}')"
      data-resultado='${JSON.stringify(a.resultado).replace(/'/g,"&#39;")}'>
      ${formatTab(a.periodo)}
    </button>`;
  }).join('');

  if (data[0]) renderResultado(data[0].resultado);
}

function selecionarAnalise(btn, resultadoStr) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  try {
    const d = JSON.parse(btn.dataset.resultado || '{}');
    renderResultado(d);
  } catch(e) {}
}

function formatTab(periodo) {
  if (!periodo) return periodo;
  const meses = {janeiro:'Jan',fevereiro:'Fev','março':'Mar',abril:'Abr',maio:'Mai',junho:'Jun',
                 julho:'Jul',agosto:'Ago',setembro:'Set',outubro:'Out',novembro:'Nov',dezembro:'Dez'};
  const lower = periodo.toLowerCase();
  for (const [nome, abrev] of Object.entries(meses)) {
    if (lower.startsWith(nome)) {
      const ano = periodo.split('/')[1]?.slice(-2) || '';
      return abrev + '/' + ano;
    }
  }
  const parts = periodo.split('/');
  if (parts.length === 2 && parts[1].length === 4) return parts[0].slice(0,3) + '/' + parts[1].slice(-2);
  return periodo;
}

function renderResultado(d) {
  const container = document.getElementById('resultado');
  if (!d || !container) return;
  const r   = d.resumo || {};
  const aud = d.auditoria || {};
  const score = aud.score || 0;
  const scoreColor = score >= 80 ? '#4CAF7D' : score >= 60 ? '#C9A84C' : '#E05C3A';
  const scoreLabel = score >= 80 ? 'ÓTIMO' : score >= 60 ? 'ATENÇÃO' : 'CRÍTICO';
  const fmt = v => v != null ? 'R$ ' + parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';

  container.innerHTML = `
    <div class="score-box">
      <div style="flex-shrink:0;text-align:center;">
        <div class="score-num" style="color:${scoreColor};">${score}</div>
        <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:${scoreColor};margin-top:2px;">${scoreLabel}</div>
        <div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim);margin-top:1px;">SCORE</div>
      </div>
      <div class="score-meta">
        <div class="score-meta-label">Score de Saúde Financeira</div>
        <div style="font-size:13px;color:var(--text);line-height:1.5;">${aud.score_explicacao || ''}</div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Receitas</div><div class="kpi-val" style="color:#4CAF7D;">${fmt(r.receitas)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Despesas</div><div class="kpi-val" style="color:#E05C3A;">${fmt(r.despesas)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Superávit</div><div class="kpi-val" style="color:${(r.superavit||0)>=0?'#4CAF7D':'#E05C3A'};">${fmt(r.superavit)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Saldo Final</div><div class="kpi-val">${fmt(r.saldo)}</div></div>
      ${r.inadimplencia != null ? `<div class="kpi-card"><div class="kpi-label">Inadimplência</div><div class="kpi-val" style="color:#C9A84C;">${parseFloat(r.inadimplencia).toFixed(1)}%</div></div>` : ''}
      ${r.fundo_reserva != null ? `<div class="kpi-card"><div class="kpi-label">Fundo de Reserva</div><div class="kpi-val">${fmt(r.fundo_reserva)}</div></div>` : ''}
    </div>

    ${aud.alertas?.length ? `
    <div class="lista-box">
      <div class="lista-titulo">⚠ Alertas</div>
      ${aud.alertas.map(a=>`<div class="lista-item" style="color:#E05C3A;">• ${a}</div>`).join('')}
    </div>` : ''}

    ${aud.pontos_positivos?.length ? `
    <div class="lista-box">
      <div class="lista-titulo">✓ Pontos Positivos</div>
      ${aud.pontos_positivos.map(p=>`<div class="lista-item" style="color:#4CAF7D;">• ${p}</div>`).join('')}
    </div>` : ''}

    ${aud.resumo_auditoria ? `
    <div class="lista-box">
      <div class="lista-titulo">Resumo da Auditoria</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6;">${aud.resumo_auditoria}</div>
    </div>` : ''}
  `;
}
</script>
</body>
</html>
